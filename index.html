<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV LOKA | VVIP REMOTE PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #39ff14; --sidebar: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 340px; background: var(--sidebar); padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .logo { font-size: 1.2rem; font-weight: 900; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .sync-box { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px dashed var(--accent); margin-bottom: 20px; text-align: center; }
        #qrcode { display: flex; justify-content: center; margin: 10px 0; background: white; padding: 5px; border-radius: 4px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--accent); border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background: var(--accent); color: black; }
        .monitor-view { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }
        #log { font-size: 0.7rem; color: #888; margin-top: 10px; height: 80px; overflow-y: auto; background: #000; padding: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="logo">CCTV LOKA VVIP</div>
    
    <div class="sync-box">
        <div style="font-size: 0.7rem; color: #888;">YOUR DEVICE ID (PC):</div>
        <div id="my-id" style="font-weight: bold; color: var(--accent); font-size: 0.8rem; word-break: break-all;">Connecting...</div>
        <div id="qrcode"></div>
    </div>

    <input type="text" id="remote-id" placeholder="Paste PC ID here">
    <button onclick="openLiveTab()" style="background: var(--accent); color: black;">🔗 OPEN CCTV IN NEW TAB</button>
    
    <hr style="width:100%; border: 0.5px solid #333; margin: 10px 0;">
    
    <button onclick="startPC()">▶ START 24H MONITOR (PC)</button>
    <button onclick="location.reload()">🔄 RESET SYSTEM</button>

    <div id="log">System Ready...</div>
</div>

<div class="monitor-view">
    <video id="v-feed" autoplay playsinline muted></video>
</div>

<script>
    let peer = new Peer();
    let localStream;
    const videoElem = document.getElementById('v-feed');

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 100, height: 100 });
        log("Server Online. ID Generated.");
    });

    peer.on('call', (call) => {
        log("Incoming connection...");
        if (localStream) {
            call.answer(localStream);
        } else {
            log("Error: Start PC camera first!");
        }
    });

    async function startPC() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElem.srcObject = localStream;
            log("PC Camera Active. Ready to sync.");
        } catch (e) {
            alert("Please use HTTPS and allow camera access!");
        }
    }

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
    }

    function openLiveTab() {
        const id = document.getElementById('remote-id').value.trim();
        if(!id) return alert("Please enter the PC ID first!");

        const newTab = window.open("", "_blank");
        newTab.document.write(`
            <html>
            <head>
                <title>LIVE CCTV FEED</title>
                <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"><\/script>
                <style>
                    body { margin: 0; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #39ff14; font-family: sans-serif; }
                    video { width: 100%; height: 100%; object-fit: contain; display: none; }
                    #btn { padding: 20px; background: #39ff14; color: black; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
                    #status { position: absolute; top: 10px; width: 100%; text-align: center; }
                </style>
            </head>
            <body>
                <div id="status">Ready to Connect to PC...</div>
                <button id="btn" onclick="startCall()">CLICK TO VIEW LIVE FEED</button>
                <video id="remoteVideo" autoplay playsinline></video>

                <script>
                    const peer = new Peer();
                    function startCall() {
                        document.getElementById('btn').style.display = 'none';
                        document.getElementById('status').innerText = 'Connecting to PC ID: ${id}...';
                        
                        // Critical: We need a dummy audio track to trigger the stream correctly on mobile
                        const canvas = document.createElement('canvas');
                        canvas.width = 10; canvas.height = 10;
                        const dummyStream = canvas.captureStream(1);

                        const call = peer.call("${id}", dummyStream);
                        
                        call.on('stream', (stream) => {
                            const v = document.getElementById('remoteVideo');
                            v.style.display = 'block';
                            v.srcObject = stream;
                            document.getElementById('status').innerText = 'LIVE FEED ACTIVE';
                            v.play();
                        });

                        call.on('error', (err) => {
                            document.getElementById('status').innerText = 'Connection Error: ' + err;
                        });
                    }
                <\/script>
            </body>
            </html>
        `);
    }
</script>
</body>
</html>
