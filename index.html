<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CCTV LOKA | REMOTE PRO AI</title><link rel="preconnect" href="https://cdn.jsdelivr.net"><link rel="preconnect" href="https://cdnjs.cloudflare.com"><script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script><style> :root { --bg: #050505; --sidebar-color: #121212; --accent: #39ff14; --danger: #ff3131; --glass: rgba(255, 255, 255, 0.05); --text: #ffffff; } body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; } .sidebar { width: 340px; background: var(--sidebar-color); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; z-index: 10; } .logo { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-align: center; } .tool-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 15px 0 8px 0; font-weight: 700; letter-spacing: 1px; } .sync-box { background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; border: 1px dashed var(--accent); margin-bottom: 15px; } #qrcode { display: flex; justify-content: center; margin: 10px auto; padding: 5px; background: white; border-radius: 4px; width: fit-content; } input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--accent); border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; } .control-panel { display: grid; grid-template-columns: 1fr; gap: 10px; } button { background: var(--glass); border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 600; text-align: left; display: flex; justify-content: space-between; align-items: center; } button:hover { background: var(--accent); color: black; } #aiLog { background: #000; border: 1px solid #222; height: 100px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.7rem; padding: 10px; color: #39ff14; margin-top: 5px; } .monitor-view { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #000; position: relative; } .cam-container { flex: 1; background: #111; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #333; } video { width: 100%; height: 100%; object-fit: contain; } #canvasOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; } .hud-top { position: absolute; top: 20px; left: 20px; z-index: 5; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); } .digital-clock { font-family: 'Courier New', monospace; font-size: 2.2rem; color: var(--accent); font-weight: bold; } .sys-footer { margin-top: 15px; background: #1a1a1a; padding: 15px; border-radius: 12px; font-size: 0.8rem; } .status-row { display: flex; justify-content: space-between; margin-bottom: 6px; } .val { color: var(--accent); font-weight: bold; } #motionAlert { color: var(--danger); font-weight: bold; visibility: hidden; } .clip-item { background: #222; padding: 8px; border-radius: 5px; margin-top: 5px; font-size: 0.75rem; display: flex; justify-content: space-between; } @media (max-width: 768px) { body { flex-direction: column; overflow-y: auto; height: auto; } .sidebar { width: 100%; box-sizing: border-box; border-right: none; } .monitor-view { height: 400px; flex: none; padding: 10px; } } </style></head><body><div class="sidebar"><div class="logo">Hi, LORA , I'M CCTV LOKA</div><div class="sync-box"><div style="font-size: 0.65rem; color: #888;">YOUR DEVICE ID (PC):</div><div id="my-id" style="font-weight: bold; color: var(--accent); font-size: 0.8rem; word-break: break-all;">Connecting...</div><div id="qrcode"></div></div><span class="tool-label">Remote Viewer</span><input type="text" id="remote-id" placeholder="Paste PC ID here"><button onclick="openLiveTab()" style="background: var(--accent); color: black;">🔗 OPEN CCTV IN NEW TAB</button><span class="tool-label">System Control</span><div class="control-panel"><button onclick="startSystem()">▶ START MONITOR (PC)</button><button onclick="stopSystem()">■ STOP SYSTEM</button><button onclick="location.reload()">🔄 RESET APP</button></div><span class="tool-label">Manual Tools</span><div class="control-panel"><button onclick="takeSnapshot()">📸 SNAPSHOT</button><button onclick="toggleNight()">🌙 NIGHT VISION</button></div><span class="tool-label">AI Event Log</span><div id="aiLog">System Ready...</div><span class="tool-label">Saved Clips</span><div id="clipGallery" style="color:#555; font-size:0.7rem;">No recordings yet.</div><div class="sys-footer"><div class="status-row"><span>Motion:</span><span id="motionAlert">DETECTED</span></div><div class="status-row"><span>AI Tracking:</span><span class="val" id="aiStatus">OFF</span></div><div class="status-row"><span>Status:</span><span class="val" id="sysStatus">STANDBY</span></div></div></div><div class="monitor-view"><div class="cam-container"><div class="hud-top"><div id="liveTime" class="digital-clock">00:00:00</div><div id="liveDate" style="color: #fff; opacity: 0.8; font-size: 0.8rem;">DATE LOADING...</div><div id="recLabel" style="display:none; color:var(--danger); font-weight:bold; font-size: 0.8rem; margin-top: 5px;">● RECORDING</div></div><video id="v-feed" autoplay playsinline muted></video><canvas id="canvasOverlay"></canvas><canvas id="motionCanvas" style="display:none;"></canvas></div></div><script> let peer = new Peer(); let localStream, mediaRecorder, lastFrameData; const videoElem = document.getElementById('v-feed'); const overlay = document.getElementById('canvasOverlay'); const overlayCtx = overlay.getContext('2d'); const motionCanvas = document.getElementById('motionCanvas'); const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true }); peer.on('open', (id) => { document.getElementById('my-id').innerText = id; new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 100, height: 100 }); log("Server Online. Sync Ready."); }); peer.on('call', (call) => { log("Incoming Handshake..."); if (localStream) { call.answer(localStream); log("Feed Shared with Remote Device."); } else { log("Remote connection rejected. Start PC Camera!"); } }); async function loadAI() { try { const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'; await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL); log("AI Facial Models Loaded."); } catch (e) { log("AI Load Error."); } } loadAI(); async function startSystem() { try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); videoElem.srcObject = localStream; document.getElementById('sysStatus').innerText = "LIVE"; document.getElementById('recLabel').style.display = "block"; initRecorder(localStream); log("PC Monitor Active."); } catch (e) { alert("Error: Enable camera access and use HTTPS."); } } function initRecorder(stream) { mediaRecorder = new MediaRecorder(stream); mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) { const url = URL.createObjectURL(e.data); const gallery = document.getElementById('clipGallery'); if (gallery.innerText.includes("No recordings")) gallery.innerHTML = ""; const item = document.createElement('div'); item.className = "clip-item"; item.innerHTML = `<span>Auto-Clip ${new Date().toLocaleTimeString()}</span><a href="${url}" download="CCTV.webm" style="color:var(--accent)">SAVE</a>`; gallery.insertBefore(item, gallery.firstChild); } }; mediaRecorder.start(60000); } function takeSnapshot() { const snap = document.createElement('canvas'); snap.width = videoElem.videoWidth; snap.height = videoElem.videoHeight; snap.getContext('2d').drawImage(videoElem, 0, 0); const a = document.createElement('a'); a.download = `SNAP_${Date.now()}.jpg`; a.href = snap.toDataURL('image/jpeg'); a.click(); log("Snapshot Saved."); } function toggleNight() { videoElem.style.filter = videoElem.style.filter ? '' : 'brightness(1.5) contrast(1.2) sepia(0.4) grayscale(0.5) hue-rotate(180deg)'; log("Night Vision Toggled."); } function stopSystem() { if (localStream) localStream.getTracks().forEach(t => t.stop()); document.getElementById('sysStatus').innerText = "STOPPED"; document.getElementById('recLabel').style.display = "none"; log("System Halted."); } function log(msg) { const l = document.getElementById('aiLog'); l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML; } function openLiveTab() { const id = document.getElementById('remote-id').value.trim(); if(!id) return alert("Please enter the PC ID first!"); const newTab = window.open("", "_blank"); newTab.document.write(` <html><head><title>LIVE CCTV FEED</title><script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"><\/script><style> body { margin: 0; background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #39ff14; font-family: sans-serif; overflow: hidden; } video { width: 100%; height: 100%; object-fit: contain; display: none; } #btn { padding: 20px; background: #39ff14; color: black; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.2rem; } #status { position: absolute; top: 10px; width: 100%; text-align: center; } </style></head><body><div id="status">Ready to Connect to PC...</div><button id="btn" onclick="startCall()">CLICK TO VIEW LIVE FEED</button><video id="remoteVideo" autoplay playsinline></video><script> const peer = new Peer(); function startCall() { document.getElementById('btn').style.display = 'none'; document.getElementById('status').innerText = 'Syncing Stream...'; const canvas = document.createElement('canvas'); canvas.width = 10; canvas.height = 10; const dummyStream = canvas.captureStream(1); const call = peer.call("${id}", dummyStream); call.on('stream', (stream) => { const v = document.getElementById('remoteVideo'); v.style.display = 'block'; v.srcObject = stream; document.getElementById('status').innerText = 'LIVE FEED ACTIVE'; v.play(); }); call.on('error', (err) => { document.getElementById('status').innerText = 'Error: ' + err; }); } <\/script></body></html> `); } setInterval(() => { const now = new Date(); document.getElementById('liveTime').innerText = now.toLocaleTimeString('en-GB'); document.getElementById('liveDate').innerText = now.toDateString(); if (videoElem.srcObject) { checkMotion(); runAI(); } }, 1000); async function runAI() { overlay.width = videoElem.videoWidth; overlay.height = videoElem.videoHeight; const detections = await faceapi.detectAllFaces(videoElem, new faceapi.TinyFaceDetectorOptions()); overlayCtx.clearRect(0,0, overlay.width, overlay.height); if (detections.length > 0) { document.getElementById('aiStatus').innerText = detections.length + " FACE(S)"; faceapi.draw.drawDetections(overlay, faceapi.resizeResults(detections, overlay)); } } function checkMotion() { motionCanvas.width = 64; motionCanvas.height = 48; motionCtx.drawImage(videoElem, 0, 0, 64, 48); const currentFrame = motionCtx.getImageData(0, 0, 64, 48).data; if (lastFrameData) { let diff = 0; for (let i = 0; i < currentFrame.length; i += 4) { diff += Math.abs(currentFrame[i] - lastFrameData[i]); } if (diff > 180000) { document.getElementById('motionAlert').style.visibility = "visible"; setTimeout(() => document.getElementById('motionAlert').style.visibility = "hidden", 2000); } } lastFrameData = currentFrame; }</script></body></html>
